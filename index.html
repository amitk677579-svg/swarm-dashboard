<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="refresh" content="300"/>
<title>SWARM Control — amitk677579-svg</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090c10;color:#e8edf3;font-family:'Space Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,170,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,170,.015) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
.app{max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:30px}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px}
.logo span{color:#00ffaa}
.live{display:flex;align-items:center;gap:8px;font-size:12px;color:#5a6475}
.pulse{width:8px;height:8px;border-radius:50%;background:#00ffaa;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,170,.4)}50%{box-shadow:0 0 0 8px rgba(0,255,170,0)}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:30px}
.stat{background:#141920;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-size:32px;font-weight:700;color:#00ffaa}
.stat-label{font-size:10px;color:#5a6475;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:#141920;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;transition:border-color .2s}
.card:hover{border-color:rgba(0,255,170,.3)}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filename{font-size:13px;font-weight:700;flex:1;color:#e8edf3}
.badge{font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(123,92,255,.15);color:#7b5cff;letter-spacing:1px}
.description{font-size:11px;color:#5a6475;margin-bottom:10px;line-height:1.5}
.meta{display:flex;gap:12px;font-size:9px;color:#5a6475;margin-bottom:8px}
.output{font-size:10px;color:#3a4455;background:#0f1318;border-radius:6px;padding:8px;max-height:60px;overflow:hidden;line-height:1.4;font-family:'Space Mono',monospace}
.updated{text-align:center;padding:30px 0;font-size:11px;color:#2a3444}
.vps{display:flex;align-items:center;gap:8px;font-size:11px;color:#5a6475}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">SW<span>ARM</span></div>
  <div class="live"><div class="pulse"></div>Live • Auto-refreshes every 5min</div>
  <div class="vps">🖥 Mumbai VPS • 217.216.59.151</div>
</header>
<div class="stats">
  <div class="stat"><div class="stat-val">0</div><div class="stat-label">Deployed</div></div>
  <div class="stat"><div class="stat-val" style="color:#00ffaa">0</div><div class="stat-label">Running</div></div>
  <div class="stat"><div class="stat-val" style="color:#7b5cff">5506</div><div class="stat-label">Files Built</div></div>
  <div class="stat"><div class="stat-val" style="color:#ffb830">17</div><div class="stat-label">Specialists</div></div>
  <div class="stat"><div class="stat-val" style="color:#ff4545">66</div><div class="stat-label">Repos Learned</div></div>
  <div class="stat"><div class="stat-val" style="color:#4fc3f7">15</div><div class="stat-label">Agents</div></div>
</div>
<div class="grid"></div>
<div class="updated">Last updated: 2026-04-23 21:12 UTC • github.com/amitk677579-svg/swarm-dashboard</div>
</div>
</body>
</html>
